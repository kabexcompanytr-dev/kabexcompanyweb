<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="k.png">
    <title>KABEX HQ | Falcım Mistik Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --k-blue: #007AFF; --glass-card: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1); --fc-purple: #8b5cf6; }
        body { font-family: 'Inter', sans-serif; background: #000; margin: 0; height: 100vh; display: flex; color: #fff; -webkit-font-smoothing: antialiased; overflow: hidden; }
        .bg-glow { position: absolute; inset: 0; background: radial-gradient(circle at 100% 0%, rgba(139, 92, 246, 0.08) 0%, #000 50%); z-index: -1; }
        aside { width: 280px; background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; padding: 40px 20px; z-index: 50; }
        .sidebar-logo img { max-width: 160px; margin-bottom: 60px; padding-left: 10px; }
        .nav-item { display: flex; align-items: center; padding: 16px 20px; border-radius: 16px; color: rgba(255,255,255,0.4); transition: 0.4s; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active i { color: var(--fc-purple); }
        main { flex: 1; padding: 40px 60px; overflow-y: auto; position: relative; }
        .grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .glass-panel { background: var(--glass-card); border: 1px solid var(--glass-border); border-radius: 35px; padding: 40px; }
        .mini-stat { background: var(--glass-card); border: 1px solid var(--glass-border); border-radius: 25px; padding: 25px; margin-bottom: 20px; transition: 0.3s; }
        .mini-stat:hover { border-color: var(--fc-purple); background: rgba(255,255,255,0.05); }
        .btn-update { background: var(--fc-purple); color: #fff; font-weight: 800; font-size: 0.75rem; padding: 12px 24px; border-radius: 14px; letter-spacing: 1px; transition: 0.3s; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <aside>
        <div class="sidebar-logo"><img src="11.png" alt="KABEX"></div>
        <nav>
            <a href="main.html" class="nav-item"><i class="fas fa-th-large"></i> <span>Genel Merkez</span></a>
            <a href="flortzone_detail.html" class="nav-item"><i class="fas fa-heart"></i> <span>FlörtZone</span></a>
            <a href="purefetch_detail.html" class="nav-item"><i class="fas fa-bolt"></i> <span>PureFetch</span></a>
            <a href="#" class="nav-item active"><i class="fas fa-crystal-ball"></i> <span>Falcım</span></a>
        </nav>
    </aside>
    <main>
        <div class="flex justify-between items-end mb-12">
            <div>
                <span class="text-purple-500 font-black text-[10px] uppercase tracking-[3px]">Fortune Forecast</span>
                <h1 class="text-4xl font-black tracking-tighter mt-2">Falcım Analiz <span class="text-purple-600">.</span></h1>
            </div>
            <button class="btn-update uppercase">Ritüeli Güncelle</button>
        </div>
        <div class="grid-layout">
            <div class="glass-panel">
                <h3 class="font-bold text-xl tracking-tight mb-10">Kredi Satın Alım Dağılımı</h3>
                <canvas id="fcChart" style="max-height: 380px;"></canvas>
            </div>
            <div>
                <div class="mini-stat">
                    <div class="text-white/30 text-[9px] font-bold uppercase tracking-[2px] mb-1">Toplam Falcı</div>
                    <div class="text-3xl font-black tracking-tighter">342</div>
                </div>
                <div class="mini-stat">
                    <div class="text-white/30 text-[9px] font-bold uppercase tracking-[2px] mb-1">Bekleyen Yorum</div>
                    <div class="text-3xl font-black tracking-tighter text-purple-500">1,820</div>
                </div>
                <div class="mini-stat">
                    <div class="text-white/30 text-[9px] font-bold uppercase tracking-[2px] mb-1">Müşteri Memnuniyeti</div>
                    <div class="text-3xl font-black tracking-tighter">4.9/5</div>
                </div>
            </div>
        </div>
    </main>
    <script>
        const ctx = document.getElementById('fcChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Kahve', 'Tarot', 'Su'],
                datasets: [{
                    data: [55, 30, 15],
                    backgroundColor: ['#8b5cf6', '#a78bfa', '#c4b5fd'],
                    borderWidth: 0,
                    hoverOffset: 20
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: { size: 10, weight: 'bold' } } } } }
        });
    </script>
</body>
</html>
